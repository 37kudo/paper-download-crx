<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>paper-download-crx</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1>paper-download-crx</h1>
      <p class="subtitle">扩展已就绪，可在底稿页面下载或上传底稿。</p>

      <label for="uploadEndpoint">上传服务地址</label>
      <input id="uploadEndpoint" type="url" placeholder="http://127.0.0.1:8766/upload" />

      <div class="actions">
        <button id="saveBtn" type="button">保存地址</button>
        <button id="pingBtn" type="button">检查状态</button>
      </div>

      <pre id="status" aria-live="polite">等待操作</pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
